spring.application.name=the-shop
server.port=8080

# ── JPA ──────────────────────────────────────────────────────────────────────
# Flyway gère le schéma — Hibernate ne touche pas à la DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

# ── Virtual Threads (Project Loom) ───────────────────────────────────────────
spring.threads.virtual.enabled=true

# ── JWT ──────────────────────────────────────────────────────────────────────
# Durées de vie (non secrètes) — le secret est défini par profil (dev/prod)
# Access : 15 min — Refresh : 7 jours
the-shop.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
the-shop.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
