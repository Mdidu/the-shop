# ── Datasource ───────────────────────────────────────────────────────────────
# localhost quand on lance depuis l'IDE — le docker-compose surcharge cette
# valeur via SPRING_DATASOURCE_URL quand le backend tourne dans Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:the_shop}
spring.datasource.username=${POSTGRES_USER:the_shop_user}
spring.datasource.password=${POSTGRES_PASSWORD:changeme}

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── JPA / SQL ─────────────────────────────────────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ───────────────────────────────────────────────────────────────────
# En dev on autorise le clean (utile pour repartir d'une base vierge)
spring.flyway.clean-disabled=false

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.com.exemple.the_shop=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO
