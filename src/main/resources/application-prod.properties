# ── Datasource ───────────────────────────────────────────────────────────────
# Toutes les valeurs sensibles viennent de variables d'environnement — pas de
# valeur par défaut intentionnellement : un démarrage sans config explose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}

# ── Flyway ───────────────────────────────────────────────────────────────────
# clean-disabled=true hérité de application.properties — jamais de clean en prod
spring.flyway.out-of-order=false

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.exemple.the_shop=INFO
